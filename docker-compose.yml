services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/hotel_booking/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  web:
    build: .
    entrypoint: ["/app/entrypoint.sh"]
    command: ["gunicorn", "hotel_booking.wsgi:application", "--bind", "0.0.0.0:8000", "--timeout", "120", "--workers", "2"]
    working_dir: /app/hotel_booking
    volumes:
      - static_volume:/app/hotel_booking/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
      - ./entrypoint.sh:/app/entrypoint.sh
      - .:/app:cached  
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=hotel_booking.deployment
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=hotelMaarDB
      - POSTGRES_USER=hotelapi_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - app-network
    # Removed port exposure for security - database only accessible internally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelapi_user -d hotelMaarDB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  app-network:
    driver: bridge
