{% extends 'manager/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card shadow-sm" style="max-width: 420px; margin: 2rem auto; border-radius: 1.1rem;">
  <div class="card-body p-4">
    <h5 class="card-title mb-3" style="font-weight: 700;">Confirm Delete</h5>
    <p class="mb-4">Are you sure you want to delete <strong>"{{ object }}"</strong>?</p>
    <form method="post">{% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger flex-fill">Confirm</button>
        <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-secondary flex-fill">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
