# Nginx configuration for Django API reverse proxy
# Place this file at /etc/nginx/conf.d/default.conf in the container

# Rate limiting zones (must be at http level)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Cache for static content
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m use_temp_path=off;

upstream hotel_api {
    least_conn;
    server web:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name api.marhotels.com.sa localhost;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Removed Content-Security-Policy header to allow Django to control CSP
    
    # Client max body size
    client_max_body_size 20M;
    
    # Hide server information
    server_tokens off;

    # API endpoints with rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://hotel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://hotel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://hotel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Static files - Django admin and DRF
    location /static/ {
        alias /app/hotel_booking/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Enable caching
        proxy_cache static_cache;
        proxy_cache_valid 200 1d;
        
        # Add CORS headers for static files if needed
        add_header Access-Control-Allow-Origin *;
    }

    # Media files - using container volume paths
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Security for uploaded files
        location ~* \.(php|php\d+|phtml|pl|asp|aspx|shtml|sh|cgi)$ {
            deny all;
        }
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    location ~ /docker-compose {
        deny all;
    }
}
